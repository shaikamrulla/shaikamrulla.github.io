<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSU HelpBot</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a1a2e;
    --accent: #c9a84c;
    --accent-light: #f0d98a;
    --bg: #f5f0e8;
    --white: #fdfcf9;
    --muted: #7a7060;
    --border: #e0dbd0;
    --bot-bubble: #ede8dc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Instrument Sans', sans-serif;
    background: transparent;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #fab {
    position: fixed; bottom: 0; right: 0;
    width: 100%; height: 100%;
    display: flex; align-items: flex-end; justify-content: flex-end;
    padding: 24px; pointer-events: none;
  }
  .fab-btn {
    width: 62px; height: 62px; border-radius: 50%;
    background: var(--primary); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transition: transform 0.2s;
    pointer-events: all; position: relative;
  }
  .fab-btn:hover { transform: scale(1.08); }
  .fab-badge {
    position: absolute; top: -3px; right: -3px;
    background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 700;
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #fff;
  }

  #chatWindow {
    display: none; flex-direction: column;
    height: 100vh; background: var(--white);
    border-radius: 20px; overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { opacity:0; transform:scale(0.92) translateY(20px); }
    to { opacity:1; transform:scale(1) translateY(0); }
  }

  .chat-header {
    background: var(--primary);
    padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .header-avatar {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-name { color: #fff; font-size: 15px; font-weight: 600; }
  .header-status { color: rgba(255,255,255,0.5); font-size: 12px; display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #5dfdcb; }
  .close-btn {
    background: none; border: none; color: rgba(255,255,255,0.5);
    font-size: 20px; cursor: pointer; transition: color 0.2s; padding: 4px;
  }
  .close-btn:hover { color: #fff; }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }

  .msg { display: flex; gap: 8px; max-width: 88%; animation: msgIn 0.2s ease; }
  @keyframes msgIn { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);} }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }
  .msg.user .msg-avatar { background: var(--primary); }

  .bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
  .msg.bot  .bubble { background: var(--bot-bubble); color: var(--primary); border-radius: 4px 16px 16px 16px; }
  .msg.user .bubble { background: var(--primary); color: #f5f0e8; border-radius: 16px 4px 16px 16px; }

  .typing-dots { display: flex; gap: 4px; padding: 4px 2px; }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);} }

  .suggestions {
    padding: 0 16px 12px;
    display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0;
  }
  .sug-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 100px; padding: 6px 13px;
    font-size: 12px; color: var(--primary);
    cursor: pointer; font-family: 'Instrument Sans';
    transition: all 0.2s; white-space: nowrap;
  }
  .sug-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

  .chat-input-wrap {
    padding: 12px 16px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-end;
    flex-shrink: 0; background: var(--white);
  }
  #userInput {
    flex: 1; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: 12px;
    font-family: 'Instrument Sans'; font-size: 14px;
    resize: none; outline: none; background: var(--bg);
    color: var(--primary); transition: border-color 0.2s;
    max-height: 100px; overflow-y: auto; line-height: 1.5;
  }
  #userInput:focus { border-color: var(--accent); }
  #userInput::placeholder { color: var(--muted); }
  .send-btn {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--primary); border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all 0.2s; flex-shrink: 0;
  }
  .send-btn:hover { background: #2d2d4e; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<div id="fab">
  <button class="fab-btn" onclick="openChat()">
    🎓
    <span class="fab-badge">?</span>
  </button>
</div>

<div id="chatWindow">
  <div class="chat-header">
    <div class="header-avatar">🎓</div>
    <div class="header-info">
      <div class="header-name">DSU HelpBot</div>
      <div class="header-status"><span class="status-dot"></span> Online · Ask me anything</div>
    </div>
    <button class="close-btn" onclick="closeChat()">✕</button>
  </div>

  <div id="messages">
    <div class="msg bot">
      <div class="msg-avatar">🎓</div>
      <div class="bubble">
        Hi! I'm DSU HelpBot 👋<br>
        Ask me anything about <strong>Dhanalakshmi Srinivasan University</strong> — admissions, fees, exams, hostel and more!
      </div>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="sug-btn" onclick="useSuggestion(this)">Admission requirements?</button>
    <button class="sug-btn" onclick="useSuggestion(this)">What is the fee?</button>
    <button class="sug-btn" onclick="useSuggestion(this)">Hostel details?</button>
    <button class="sug-btn" onclick="useSuggestion(this)">When are exams?</button>
  </div>

  <div class="chat-input-wrap">
    <textarea id="userInput" placeholder="Type your question..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  DSU COLLEGE DATA — Add or edit questions/answers here!
// ══════════════════════════════════════════════════════════
const COLLEGE_FAQ = [
  {
    keywords: ["admission", "apply", "requirement", "eligibility", "join", "enroll", "criteria"],
    answer: "Admission to DSU requires a minimum of 60% marks in 10+2.\n\nRequired documents:\n✅ Transfer Certificate (TC)\n✅ Mark Sheet\n✅ Passport-size photos\n\n📅 Last date to apply: June 30"
  },
  {
    keywords: ["document", "certificate", "tc", "marksheet", "photo", "needed", "required"],
    answer: "Documents required for admission:\n✅ Transfer Certificate (TC)\n✅ 10+2 Mark Sheet\n✅ Passport-size photographs"
  },
  {
    keywords: ["last date", "deadline", "due date", "closing date", "apply before"],
    answer: "The last date to apply for admission at DSU is June 30. Submit all documents before the deadline to secure your seat."
  },
  {
    keywords: ["fee", "fees", "cost", "tuition", "annual", "pay", "payment", "amount", "charges"],
    answer: "DSU Fee Structure:\n💰 Annual Tuition Fee: ₹1,20,000\n🏠 Hostel Fee: ₹80,000 per year\n\nContact the accounts office for payment schedule and options."
  },
  {
    keywords: ["hostel", "accommodation", "stay", "boarding", "room", "dorm", "lodge"],
    answer: "DSU Hostel Details:\n✅ Available for both boys and girls\n💰 Fee: ₹80,000 per year\n🕘 In-time (curfew): 9:00 PM daily\n\nContact the hostel warden for room availability."
  },
  {
    keywords: ["in-time", "intime", "curfew", "night", "hostel time", "return time"],
    answer: "The hostel in-time (curfew) at DSU is 9:00 PM. All students must return to their rooms before 9:00 PM daily."
  },
  {
    keywords: ["exam", "exams", "examination", "test", "semester", "sem", "schedule"],
    answer: "DSU Exam Schedule:\n📅 Semester 1 exams: November\n📋 Results published: Within 30 days after exams\n\nCheck your student portal for detailed timetables."
  },
  {
    keywords: ["result", "results", "marks", "grade", "score", "when result", "publish"],
    answer: "Exam results at DSU are published within 30 days after the semester exams are completed. Check the student portal or official website."
  },
  {
    keywords: ["percentage", "minimum", "pass", "cutoff", "cut off", "marks required"],
    answer: "The minimum eligibility for admission to DSU is 60% marks in 10+2 (Class 12)."
  },
  {
    keywords: ["about", "university", "dsu", "dhanalakshmi", "srinivasan", "college info"],
    answer: "Dhanalakshmi Srinivasan University (DSU) is a leading university offering quality education in Engineering, Arts, Science, and Management programs."
  },
  {
    keywords: ["contact", "phone", "email", "office", "reach", "help", "address", "location"],
    answer: "For further assistance, please contact the DSU Administrative Office directly. Visit the official DSU website or go to the admissions office on campus."
  },
  {
    keywords: ["placement", "job", "career", "recruit", "company", "salary", "package"],
    answer: "DSU has an active Training & Placement cell that connects students with top companies. Contact the T&P office for the latest placement statistics and upcoming drives."
  },
  {
    keywords: ["library", "book", "borrow", "reading", "study"],
    answer: "The DSU library is open to all students. Visit the library on campus for borrowing books, accessing digital resources, and study space."
  },
  {
    keywords: ["transport", "bus", "route", "pick up", "drop", "vehicle"],
    answer: "DSU provides transport facilities for day scholars. Contact the transport office for bus routes, timings, and fees applicable to your area."
  }
];

let isTyping = false;

function openChat() {
  document.getElementById('fab').style.display = 'none';
  const win = document.getElementById('chatWindow');
  win.style.display = 'flex';
  document.getElementById('userInput').focus();
}

function closeChat() {
  document.getElementById('chatWindow').style.display = 'none';
  document.getElementById('fab').style.display = 'flex';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function useSuggestion(btn) {
  document.getElementById('userInput').value = btn.textContent;
  document.getElementById('suggestions').style.display = 'none';
  sendMessage();
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const query = input.value.trim();
  if (!query || isTyping) return;
  input.value = ''; input.style.height = 'auto';

  addUserMsg(query);
  document.getElementById('suggestions').style.display = 'none';
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;

  const typingEl = addTyping();
  setTimeout(() => {
    typingEl.remove();
    addBotMsg(getAnswer(query));
    isTyping = false;
    document.getElementById('sendBtn').disabled = false;
  }, 600);
}

function getAnswer(query) {
  const q = query.toLowerCase();
  let best = null, bestScore = 0;

  for (const faq of COLLEGE_FAQ) {
    const score = faq.keywords.reduce((acc, kw) => acc + (q.includes(kw) ? 2 : 0), 0);
    if (score > bestScore) { bestScore = score; best = faq; }
  }

  if (!best || bestScore === 0) {
    return "I'm not sure about that. Please contact the DSU administrative office directly for more information. 😊";
  }
  return best.answer;
}

function addUserMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="msg-avatar">👤</div><div class="bubble">${esc(text)}</div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function addBotMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg bot';
  const formatted = esc(text).replace(/\n/g, '<br>');
  el.innerHTML = `<div class="msg-avatar">🎓</div><div class="bubble">${formatted}</div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.innerHTML = `<div class="msg-avatar">🎓</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
  return el;
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
