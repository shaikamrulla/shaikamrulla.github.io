<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSU HelpBot</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --maroon: #7b1c2e;
    --maroon-dark: #5a1220;
    --maroon-light: #9e2a3f;
    --gold: #c9922a;
    --gold-light: #f0c060;
    --bg: #fdf8f0;
    --white: #ffffff;
    --muted: #7a6a5a;
    --border: #e8ddd0;
    --bot-bubble: #fdf0e8;
    --user-bubble: #7b1c2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Instrument Sans', sans-serif;
    background: transparent;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* FAB */
  #fab {
    position: fixed; bottom: 0; right: 0;
    width: 100%; height: 100%;
    display: flex; align-items: flex-end; justify-content: flex-end;
    padding: 24px; pointer-events: none;
  }
  .fab-btn {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, var(--maroon), var(--maroon-light));
    border: 3px solid var(--gold);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    box-shadow: 0 4px 20px rgba(123,28,46,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    pointer-events: all; position: relative;
  }
  .fab-btn:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(123,28,46,0.5); }
  .fab-badge {
    position: absolute; top: -4px; right: -4px;
    background: var(--gold); color: #fff;
    font-size: 10px; font-weight: 700;
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #fff;
  }
  .fab-pulse {
    position: absolute; width: 100%; height: 100%;
    border-radius: 50%;
    background: rgba(123,28,46,0.3);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  /* Chat window */
  #chatWindow {
    display: none; flex-direction: column;
    height: 100vh; background: var(--white);
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { opacity:0; transform:scale(0.94) translateY(16px); }
    to { opacity:1; transform:scale(1) translateY(0); }
  }

  /* Header */
  .chat-header {
    background: linear-gradient(135deg, var(--maroon-dark) 0%, var(--maroon) 100%);
    padding: 0 20px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
    border-bottom: 3px solid var(--gold);
    position: relative;
    overflow: hidden;
    min-height: 70px;
  }
  .chat-header::before {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 120px; height: 120px;
    background: rgba(201,146,42,0.08);
    border-radius: 50%;
    transform: translate(30px, -30px);
  }
  .header-logo {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    border: 2px solid rgba(255,255,255,0.2);
  }
  .header-info { flex: 1; }
  .header-name { color: #fff; font-size: 15px; font-weight: 700; letter-spacing: 0.3px; }
  .header-college { color: var(--gold-light); font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 3px; }
  .header-status { color: rgba(255,255,255,0.5); font-size: 11px; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #5dfdcb; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .close-btn {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7); font-size: 16px; cursor: pointer;
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .close-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

  /* Messages */
  #messages {
    flex: 1; overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
    background: var(--bg);
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }

  .msg { display: flex; gap: 8px; max-width: 90%; animation: msgIn 0.2s ease; }
  @keyframes msgIn { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, var(--maroon), var(--maroon-light));
    border: 2px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }
  .msg.user .msg-avatar {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-color: var(--maroon);
  }

  .bubble {
    padding: 11px 15px; border-radius: 16px;
    font-size: 13.5px; line-height: 1.6;
    max-width: 100%;
  }
  .msg.bot .bubble {
    background: var(--white);
    color: #2a1a1a;
    border-radius: 4px 16px 16px 16px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, var(--maroon), var(--maroon-light));
    color: #fff;
    border-radius: 16px 4px 16px 16px;
    box-shadow: 0 2px 8px rgba(123,28,46,0.3);
  }

  /* Typing dots */
  .typing-dots { display: flex; gap: 4px; padding: 4px 2px; }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--maroon-light);
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);} }

  /* Suggestions */
  .suggestions {
    padding: 8px 16px 12px;
    display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }
  .sug-label { width: 100%; font-size: 11px; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 2px; }
  .sug-btn {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 100px; padding: 6px 14px;
    font-size: 12px; color: var(--maroon);
    cursor: pointer; font-family: 'Instrument Sans';
    font-weight: 500;
    transition: all 0.2s; white-space: nowrap;
  }
  .sug-btn:hover {
    background: var(--maroon); color: #fff;
    border-color: var(--maroon);
    box-shadow: 0 2px 8px rgba(123,28,46,0.2);
  }

  /* Input area */
  .chat-input-wrap {
    padding: 12px 16px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-end;
    flex-shrink: 0; background: var(--white);
  }
  #userInput {
    flex: 1; padding: 10px 14px;
    border: 1.5px solid var(--border); border-radius: 12px;
    font-family: 'Instrument Sans'; font-size: 14px;
    resize: none; outline: none; background: var(--bg);
    color: #2a1a1a; transition: border-color 0.2s;
    max-height: 100px; overflow-y: auto; line-height: 1.5;
  }
  #userInput:focus { border-color: var(--maroon); }
  #userInput::placeholder { color: var(--muted); }
  .send-btn {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, var(--maroon), var(--maroon-light));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all 0.2s; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(123,28,46,0.3);
  }
  .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(123,28,46,0.4); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Footer brand */
  .chat-footer {
    text-align: center; padding: 6px;
    font-size: 10px; color: var(--muted);
    background: var(--white);
    border-top: 1px solid var(--border);
    letter-spacing: 0.5px;
  }
  .chat-footer span { color: var(--maroon); font-weight: 600; }
</style>
</head>
<body>

<!-- FAB Button -->
<div id="fab">
  <button class="fab-btn" onclick="openChat()">
    <div class="fab-pulse"></div>
    🎓
    <span class="fab-badge">?</span>
  </button>
</div>

<!-- Chat Window -->
<div id="chatWindow">

  <!-- Header -->
  <div class="chat-header">
    <div class="header-logo">🎓</div>
    <div class="header-info">
      <div class="header-college">Dhanalakshmi Srinivasan University</div>
      <div class="header-name">DSU HelpBot</div>
      <div class="header-status"><span class="status-dot"></span> Online · Ready to help</div>
    </div>
    <button class="close-btn" onclick="closeChat()">✕</button>
  </div>

  <!-- Messages -->
  <div id="messages">
    <div class="msg bot">
      <div class="msg-avatar">🎓</div>
      <div class="bubble">
        நமஸ்காரம்! Hi! I'm <strong>DSU HelpBot</strong> 👋<br><br>
        I can answer your questions about <strong>Dhanalakshmi Srinivasan University</strong> — admissions, fees, exams, hostel, placements and more!
      </div>
    </div>
  </div>

  <!-- Quick suggestions -->
  <div class="suggestions" id="suggestions">
    <div class="sug-label">Quick questions:</div>
    <button class="sug-btn" onclick="useSuggestion(this)">Admission requirements</button>
    <button class="sug-btn" onclick="useSuggestion(this)">Fee structure</button>
    <button class="sug-btn" onclick="useSuggestion(this)">Hostel details</button>
    <button class="sug-btn" onclick="useSuggestion(this)">Exam schedule</button>
    <button class="sug-btn" onclick="useSuggestion(this)">Placement info</button>
  </div>

  <!-- Input -->
  <div class="chat-input-wrap">
    <textarea id="userInput" placeholder="Ask your question here..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

  <!-- Footer -->
  <div class="chat-footer">Powered by <span>DSU</span> · Official Student Help Assistant</div>

</div>

<script>
// ══════════════════════════════════════════════════════
//  DSU COLLEGE DATA — Edit answers here anytime!
// ══════════════════════════════════════════════════════
const COLLEGE_FAQ = [
  {
    keywords: ["admission", "apply", "requirement", "eligibility", "join", "enroll", "criteria", "how to join"],
    answer: "📋 DSU Admission Requirements:\n\n✅ Minimum 60% marks in 10+2\n✅ Transfer Certificate (TC)\n✅ Mark Sheet\n✅ Passport-size photographs\n\n📅 Last date to apply: June 30\n\nApply online at dsuniversity.ac.in or visit the campus."
  },
  {
    keywords: ["document", "certificate", "tc", "marksheet", "photo", "needed", "required", "bring"],
    answer: "📁 Documents Required for Admission:\n\n✅ Transfer Certificate (TC)\n✅ 10+2 / HSC Mark Sheet\n✅ Passport-size photographs (4 copies)\n✅ Aadhaar Card (original + photocopy)\n✅ Community Certificate (if applicable)"
  },
  {
    keywords: ["last date", "deadline", "closing date", "apply before", "due date"],
    answer: "📅 Last date to apply for DSU admissions is June 30.\n\nDon't miss the deadline! Submit all documents on time to confirm your seat."
  },
  {
    keywords: ["fee", "fees", "cost", "tuition", "annual", "pay", "payment", "amount", "charges", "how much"],
    answer: "💰 DSU Fee Structure:\n\n📚 Annual Tuition Fee: ₹1,20,000\n🏠 Hostel Fee: ₹80,000 per year\n\nContact the Accounts Office for payment schedule and installment options.\n📞 Toll Free: 1800-5322-222"
  },
  {
    keywords: ["hostel", "accommodation", "stay", "boarding", "room", "dorm", "lodge", "girls hostel", "boys hostel"],
    answer: "🏠 DSU Hostel Facilities:\n\n✅ Separate hostels for boys and girls\n💰 Fee: ₹80,000 per year\n🕘 In-time (curfew): 9:00 PM\n🍽️ Mess facility available\n\nContact the Hostel Warden for room availability and booking."
  },
  {
    keywords: ["in-time", "intime", "curfew", "night", "hostel time", "return", "timing"],
    answer: "🕘 DSU Hostel In-Time: 9:00 PM\n\nAll students must return to the hostel before 9:00 PM daily. Late entry requires prior permission from the warden."
  },
  {
    keywords: ["exam", "exams", "examination", "test", "semester", "sem", "schedule", "timetable"],
    answer: "📝 DSU Exam Schedule:\n\n📅 Semester 1 exams: November\n📅 Semester 2 exams: April/May\n📋 Results: Within 30 days after exams\n\nDetailed timetables are published on the student portal at mycamu.co.in"
  },
  {
    keywords: ["result", "results", "marks", "grade", "score", "when result", "published", "portal"],
    answer: "📊 DSU Exam Results:\n\nResults are published within 30 days after exams.\n\n🌐 Check results at: mycamu.co.in (Student Login Portal)"
  },
  {
    keywords: ["percentage", "minimum", "cutoff", "cut off", "marks required", "pass marks"],
    answer: "📌 Minimum eligibility for DSU admission:\n\n60% marks in 10+2 (Class 12) in relevant stream.\n\nDifferent programs may have additional requirements. Contact the admissions office for program-specific details."
  },
  {
    keywords: ["placement", "job", "career", "recruit", "company", "salary", "package", "campus", "drive"],
    answer: "💼 DSU Placements:\n\nDSU has an active HRDC (Human Resource Development Centre) that connects students with top companies.\n\n🏢 Recruiters include: TCS, Infosys, Wipro, Tech Mahindra and many more.\n\nContact the HRDC office for upcoming placement drives and internship opportunities."
  },
  {
    keywords: ["transport", "bus", "route", "pick up", "drop", "vehicle", "travel"],
    answer: "🚌 DSU Transport:\n\nBus facility is available for day scholars from various routes.\n\nContact the Transport Office for:\n✅ Available routes\n✅ Bus timings\n✅ Transport fees"
  },
  {
    keywords: ["library", "book", "borrow", "reading", "study", "digital"],
    answer: "📚 DSU Library:\n\n✅ Open to all students\n✅ Large collection of books, journals & digital resources\n✅ Separate study halls available\n\nVisit the library on campus or ask your department for library card details."
  },
  {
    keywords: ["scholarship", "financial aid", "merit", "free", "concession"],
    answer: "🎓 DSU Scholarships:\n\nDSU offers merit-based and need-based scholarships.\n\n✅ Government scholarships accepted\n✅ Management scholarships available\n\nContact the Scholarship Cell or visit dsuniversity.ac.in for current scholarship details."
  },
  {
    keywords: ["course", "program", "department", "branch", "engineering", "arts", "science", "medicine", "law", "pharmacy"],
    answer: "🏛️ DSU Programs Available:\n\n🔬 Engineering & Technology\n⚕️ Medicine & Allied Health\n🌾 Agricultural Sciences\n💊 Pharmacy\n⚖️ Law\n🏗️ Architecture\n💼 Management (MBA)\n🎨 Arts & Science\n\nVisit dsuniversity.ac.in for full list of programs and eligibility."
  },
  {
    keywords: ["contact", "phone", "email", "office", "reach", "address", "location", "where", "campus"],
    answer: "📞 Contact DSU:\n\n📍 NH-45, Trichy–Chennai Trunk Road,\nSamayapuram (Near Samayapuram Toll Plaza),\nTiruchirappalli – 621 112, Tamil Nadu\n\n☎️ Toll Free: 1800-5322-222\n🌐 Website: dsuniversity.ac.in"
  },
  {
    keywords: ["about", "university", "dsu", "dhanalakshmi", "srinivasan", "established", "ranking", "naac", "nirf"],
    answer: "🏛️ About Dhanalakshmi Srinivasan University:\n\n✅ Established under Tamil Nadu Private Universities Act, 2019\n✅ Located in Tiruchirappalli, Tamil Nadu\n✅ Multi-disciplinary — Medicine, Engineering, Law, Agriculture & more\n✅ Motto: \"Education for the Real World\"\n✅ Ranked 44th among colleges by NIRF 2024\n\n🌐 dsuniversity.ac.in"
  },
  {
    keywords: ["anti ragging", "ragging", "complaint", "grievance", "committee", "safe"],
    answer: "🛡️ DSU has a strict Anti-Ragging Policy.\n\nIf you face any issues:\n✅ Contact the Anti-Ragging Committee on campus\n✅ Call the national helpline: 1800-180-5522\n✅ Report online at dsuniversity.ac.in\n\nYour safety is our priority."
  },
  {
    keywords: ["phd", "research", "doctorate", "mphil", "jrf", "fellowship"],
    answer: "🔬 DSU Research Programs:\n\n✅ Ph.D. admissions open\n✅ Research Entrance Test conducted\n✅ Junior Research Fellowship (JRF) available\n\nCheck dsuniversity.ac.in for current Ph.D. openings and eligibility."
  }
];

let isTyping = false;

function openChat() {
   document.getElementById('fab').style.display = 'none';
  document.getElementById('chatWindow').style.display = 'flex';
  window.parent.postMessage('BOT_OPEN', '*');
  setTimeout(() => document.getElementById('userInput').focus(), 300);
}

function closeChat() {
   document.getElementById('chatWindow').style.display = 'none';
  document.getElementById('fab').style.display = 'flex';
  window.parent.postMessage('BOT_CLOSE', '*');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function useSuggestion(btn) {
  document.getElementById('userInput').value = btn.textContent;
  document.getElementById('suggestions').style.display = 'none';
  sendMessage();
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const query = input.value.trim();
  if (!query || isTyping) return;
  input.value = ''; input.style.height = 'auto';

  addUserMsg(query);
  document.getElementById('suggestions').style.display = 'none';
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;

  const typingEl = addTyping();
  setTimeout(() => {
    typingEl.remove();
    addBotMsg(getAnswer(query));
    isTyping = false;
    document.getElementById('sendBtn').disabled = false;
  }, 700);
}

function getAnswer(query) {
  const q = query.toLowerCase();
  let best = null, bestScore = 0;

  for (const faq of COLLEGE_FAQ) {
    const score = faq.keywords.reduce((acc, kw) => acc + (q.includes(kw) ? 2 : 0), 0);
    if (score > bestScore) { bestScore = score; best = faq; }
  }

  if (!best || bestScore === 0) {
    return "🙏 I'm not sure about that. Please contact the DSU Administrative Office for more details.\n\n☎️ Toll Free: 1800-5322-222\n🌐 dsuniversity.ac.in";
  }
  return best.answer;
}

function addUserMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="msg-avatar">👤</div><div class="bubble">${esc(text)}</div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function addBotMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg bot';
  const formatted = esc(text).replace(/\n/g, '<br>');
  el.innerHTML = `<div class="msg-avatar">🎓</div><div class="bubble">${formatted}</div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.innerHTML = `<div class="msg-avatar">🎓</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
  return el;
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
