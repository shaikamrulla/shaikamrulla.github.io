<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dhanalakshmi Srinivasan University</title>
</head>
<body>

  <h1>Welcome to Our College</h1>
  <p>Your college website content goes here.</p>

  <!-- DSU HelpBot -->
  <iframe
    id="dsu-bot"
    src="./widget.html"
    style="
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 80px;
      height: 80px;
      border: none;
      background: transparent;
      z-index: 9999;
      border-radius: 50%;
      transition: all 0.3s ease;
    "
    allowtransparency="true"
    scrolling="no">
  </iframe>

  <style>
    @media (max-width: 480px) {
      #dsu-bot.open {
        width: 100vw !important;
        height: 100vh !important;
        bottom: 0 !important;
        right: 0 !important;
        border-radius: 0 !important;
      }
    }
  </style>

  <script>
    window.addEventListener('message', function(e) {
      const bot = document.getElementById('dsu-bot');
      if (e.data === 'BOT_OPEN') {
        bot.style.width = '400px';
        bot.style.height = '580px';
        bot.style.bottom = '24px';
        bot.style.right = '24px';
        bot.style.borderRadius = '20px';
        bot.style.boxShadow = '0 8px 40px rgba(0,0,0,0.2)';
      }
      if (e.data === 'BOT_CLOSE') {
        bot.style.width = '80px';
        bot.style.height = '80px';
        bot.style.borderRadius = '50%';
        bot.style.boxShadow = 'none';
      }
    });
  </script>

</body>
</html>
