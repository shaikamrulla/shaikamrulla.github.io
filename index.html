<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dhanalakshmi Srinivasan University</title>
</head>
<body>

  <h1>Welcome to Our College</h1>
  <p>Your college website content goes here.</p>

  <!-- DSU HelpBot -->
  <iframe
    id="dsu-bot"
    src="./widget.html"
    style="
      position: fixed;
      bottom: 0;
      right: 0;
      width: 420px;
      height: 100vh;
      border: none;
      background: transparent;
      z-index: 9999;
    "
    allowtransparency="true"
    scrolling="no">
  </iframe>

  <style>
    @media (max-width: 480px) {
      #dsu-bot { width: 100vw !important; }
    }
  </style>

  <script>
    // Listen for open/close messages from the widget
    window.addEventListener('message', function(e) {
      const bot = document.getElementById('dsu-bot');
      if (e.data === 'BOT_OPEN') {
        bot.style.width = '420px';
        bot.style.height = '100vh';
      }
      if (e.data === 'BOT_CLOSE') {
        bot.style.width = '90px';
        bot.style.height = '90px';
        bot.style.bottom = '0';
        bot.style.right = '0';
      }
    });
  </script>

</body>
</html>
